{{/* Kramerius Public — Headless Service (direct pod IP discovery); StatefulSet serviceName references this name */}}
apiVersion: v1
kind: Service
metadata:
  name: kramerius-public
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kramerius.labels" . | nindent 4 }}
    app.kubernetes.io/name: kramerius-public
    app.kubernetes.io/component: kramerius-public
spec:
  clusterIP: None
  selector:
    {{- include "kramerius.public.matchLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080

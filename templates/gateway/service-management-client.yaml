{{- if .Values.gateway.managementClient.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: gateway-management-client
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kramerius.labels" . | nindent 4 }}
    {{- include "kramerius.gateway.management.matchLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "kramerius.gateway.management.matchLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.gateway.managementClient.port | default 8080 }}
      targetPort: http
{{- end }}

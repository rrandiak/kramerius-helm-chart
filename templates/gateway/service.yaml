apiVersion: v1
kind: Service
metadata:
  name: gateway-openresty
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kramerius.labels" . | nindent 4 }}
    {{- include "kramerius.gateway.matchLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "kramerius.gateway.matchLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http


{{- if eq (include "kramerius.observability.enabled" .) "true" }}
{{- $c := ((.Values.observability | default dict).clickhouse | default dict) }}
{{- $retentionDays := ($c.retentionDays | default 90) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: clickhouse-ttl-{{ $retentionDays }}d
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kramerius.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ include "kramerius.observability.clickhouseName" . }}
    app.kubernetes.io/component: observability
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: clickhouse-ttl
          image: {{ (default "clickhouse/clickhouse-server" ($c.image | default dict).repository) }}:{{ (default "25.4-alpine" ($c.image | default dict).tag) }}
          command:
            - /bin/sh
            - -c
            - |
              HOST={{ include "kramerius.observability.clickhouseName" . | quote }}
              echo "Waiting for ClickHouse at $HOST..."
              until clickhouse client --host="$HOST" --user={{ $c.user | default "" | quote }} --password={{ $c.password | default "" | quote }} --query "SELECT 1" > /dev/null 2>&1; do
                sleep 2
              done
              echo "ClickHouse ready. Applying TTL ({{ $retentionDays }} days)..."
              clickhouse client --host="$HOST" --user={{ $c.user | default "" | quote }} --password={{ $c.password | default "" | quote }} --multiquery \
                "ALTER TABLE default.nginx_access_logs MODIFY TTL toDateTime(timestamp) + INTERVAL {{ $retentionDays }} DAY;
                 ALTER TABLE default.otel_traces MODIFY TTL toDateTime(Timestamp) + INTERVAL {{ $retentionDays }} DAY;
                 ALTER TABLE default.otel_traces_trace_id_ts MODIFY TTL toDateTime(Start) + INTERVAL {{ $retentionDays }} DAY;"
              echo "Done."
{{- end }}

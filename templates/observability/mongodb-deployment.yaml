{{- if eq (include "kramerius.observability.enabled" .) "true" }}
{{- $m := ((.Values.observability | default dict).mongodb | default dict) }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-data
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kramerius.labels" . | nindent 4 }}
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: observability
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ (($m.storage | default dict).size | default "1Gi") }}
  {{- if ($m.storage | default dict).storageClass }}
  storageClassName: {{ $m.storage.storageClass | quote }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kramerius.labels" . | nindent 4 }}
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: observability
spec:
  selector:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: observability
  ports:
    - name: mongo
      port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kramerius.labels" . | nindent 4 }}
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mongodb
      app.kubernetes.io/component: observability
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb
        app.kubernetes.io/component: observability
    spec:
      {{- if (($m.image | default dict).pullSecret) }}
      imagePullSecrets:
        - name: {{ $m.image.pullSecret | quote }}
      {{- end }}
      containers:
        - name: mongodb
          image: {{ ($m.image | default dict).repository | default "mongo" }}:{{ ($m.image | default dict).tag | default "7" }}
          imagePullPolicy: {{ ($m.image | default dict).pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 27017
              name: mongo
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          resources:
            {{- toYaml ($m.resources | default dict) | nindent 12 }}
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: mongodb-data
{{- end }}

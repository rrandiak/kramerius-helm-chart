{{/* Kramerius Curator — Headless Service (direct pod IP discovery); StatefulSet serviceName references this name */}}
apiVersion: v1
kind: Service
metadata:
  name: kramerius-curator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kramerius.labels" . | nindent 4 }}
    app.kubernetes.io/name: kramerius-curator
    app.kubernetes.io/component: kramerius-curator
spec:
  clusterIP: None
  selector:
    {{- include "kramerius.curator.matchLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: 8080

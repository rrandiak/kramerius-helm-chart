{{/* Kramerius Curator — StatefulSet (administrative read-write app instances) */}}
{{- if lt (int .Values.krameriusCurator.replicas) 1 }}
  {{- fail "krameriusCurator.replicas must be >= 1" }}
{{- end }}
{{- if and (.Values.krameriusCurator.catalinaOptsOverride | default "" | trim) (.Values.krameriusCurator.catalinaOptsExtra | default "" | trim) }}
  {{- fail "krameriusCurator: catalinaOptsOverride and catalinaOptsExtra are mutually exclusive" }}
{{- end }}
{{- $curReservedMounts := list "/root/.kramerius4" "/root/.kramerius4/configuration.properties" "/root/.kramerius4/keycloak.json" "/usr/local/tomcat/conf/logging.properties" "/usr/local/tomcat/logs" }}
{{- range .Values.krameriusCurator.customConfigs | default list }}
  {{- if has .mountPath $curReservedMounts }}
    {{- fail (printf "krameriusCurator.customConfigs: mountPath %q conflicts with a built-in volume mount" .mountPath) }}
  {{- end }}
{{- end }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kramerius-curator
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kramerius.labels" . | nindent 4 }}
    app.kubernetes.io/name: kramerius-curator
    app.kubernetes.io/component: kramerius-curator
spec:
  replicas: {{ .Values.krameriusCurator.replicas }}
  selector:
    matchLabels:
      {{- include "kramerius.curator.matchLabels" . | nindent 6 }}
  serviceName: kramerius-curator
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  revisionHistoryLimit: 2
  template:
    metadata:
      labels:
        {{- include "kramerius.curator.matchLabels" . | nindent 8 }}
      annotations:
        checksum/kramerius-values: {{ include "kramerius.checksum.krameriusCuratorPod" . | quote }}
    spec:
      serviceAccountName: kramerius-curator
      {{- if .Values.krameriusCurator.image.pullSecret }}
      imagePullSecrets:
        - name: {{ .Values.krameriusCurator.image.pullSecret | quote }}
      {{- end }}
      affinity:
        {{- include "kramerius.podAntiAffinity" (dict
          "type"        (.Values.krameriusCurator.affinity.type | default "hard")
          "matchLabels" (fromYaml (include "kramerius.curator.matchLabels" .))
        ) | nindent 8 }}
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: kramerius-curator
          image: {{ .Values.krameriusCurator.image.repository }}:{{ .Values.krameriusCurator.image.tag }}
          imagePullPolicy: {{ .Values.krameriusCurator.image.pullPolicy | default "Always" }}
          ports:
            - containerPort: 8080
              name: tomcat
          envFrom:
            - configMapRef:
                name: timezone-config
          env:
{{- include "kramerius.tomcatLogsPodNameEnv" . | nindent 12 }}
            {{- $curEnv := mergeOverwrite (deepCopy (.Values.krameriusCurator.env | default dict)) (.Values.krameriusCurator.shadowEnv | default dict) }}
            {{- range $k, $v := $curEnv }}
            {{- if ne $k "CATALINA_OPTS" }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
            {{- if not (hasKey $curEnv "HAZELCAST_SERVER_ADDRESSES") }}
            - name: HAZELCAST_SERVER_ADDRESSES
              value: {{ include "kramerius.hazelcastServerAddresses" . | quote }}
            {{- end }}
            {{- if not (hasKey $curEnv "PROCESS_MANAGER_URL") }}
            - name: PROCESS_MANAGER_URL
              value: {{ include "kramerius.processManagerUrl" . | quote }}
            {{- end }}
            - name: CATALINA_OPTS
              value: {{ if (.Values.krameriusCurator.catalinaOptsOverride | default "") | trim }}{{ .Values.krameriusCurator.catalinaOptsOverride | trim | quote }}{{ else }}{{ include "kramerius.mergeCatalinaOpts" (dict "root" . "memory" .Values.krameriusCurator.catalinaOptsMemory "javaagents" (.Values.krameriusCurator.javaagents | default list) "extra" .Values.krameriusCurator.catalinaOptsExtra "otelComp" ((.Values.observability | default dict).otel | default dict).krameriusCurator "otelServiceName" "kramerius-curator" "globalShadow" ((.Values.shadow | default dict).catalinaOpts | default "")) | quote }}{{ end }}
          volumeMounts:
{{- include "kramerius.perAppJavaagentVolumeMounts" (dict "root" . "javaagents" (.Values.krameriusCurator.javaagents | default list) "otelComp" ((.Values.observability | default dict).otel | default dict).krameriusCurator) | nindent 12 }}
            - mountPath: /root/.kramerius4
              name: kramerius-curator-config-dir
            - mountPath: /root/.kramerius4/configuration.properties
              name: kramerius-curator-config
              subPath: configuration.properties
              readOnly: true
            - mountPath: /usr/local/tomcat/conf/logging.properties
              name: kramerius-curator-logging
              subPath: logging.properties
              readOnly: true
            {{- if (include "kramerius.curator.serverXml" . | trim) }}
            - mountPath: /usr/local/tomcat/conf/server.xml
              name: kramerius-curator-config
              subPath: server.xml
              readOnly: true
            {{- end }}
            {{- range $i, $c := .Values.krameriusCurator.customConfigs }}
            - mountPath: {{ $c.mountPath }}
              name: kramerius-curator-config
              subPath: custom-config-{{ $i }}
              readOnly: true
            {{- end }}
            - mountPath: /root/.kramerius4/keycloak.json
              name: kramerius-keycloak
              subPath: keycloak.json
              readOnly: true
            - mountPath: /usr/local/tomcat/logs
              name: kramerius-curator-tomcat-logs
              readOnly: false
            {{- if eq (include "kramerius.akubra.enabled" .) "true" }}
            - mountPath: /data/akubra/objectStore
              name: akubra-objectstore
              readOnly: false
            - mountPath: /data/akubra/datastreamStore
              name: akubra-datastream
              readOnly: false
            {{- end }}
{{- include "kramerius.importStorageVolumeMounts" (dict "root" . "readOnly" true) | nindent 12 }}
          {{- with .Values.krameriusCurator.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.krameriusCurator.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.krameriusCurator.resources | nindent 12 }}
      volumes:
        - name: kramerius-curator-config-dir
          emptyDir: {}
        - name: kramerius-curator-config
          configMap:
            name: kramerius-curator-config
        - name: kramerius-curator-logging
          configMap:
            name: kramerius-curator-logging
        - name: kramerius-keycloak
          configMap:
            name: kramerius-keycloak
{{ include "kramerius.perAppJavaagentVolumes" (dict "root" . "javaagents" (.Values.krameriusCurator.javaagents | default list) "otelComp" ((.Values.observability | default dict).otel | default dict).krameriusCurator) | nindent 8 }}
{{- if eq (include "kramerius.akubra.enabled" .) "true" }}
{{- include "kramerius.sharedStorageVolume" (dict "root" . "volumeName" "akubra-objectstore" "storageKey" "akubra-object-store") | nindent 8 }}
{{- include "kramerius.sharedStorageVolume" (dict "root" . "volumeName" "akubra-datastream" "storageKey" "akubra-datastream-store") | nindent 8 }}
{{- end }}
{{- include "kramerius.importStorageVolumes" (dict "root" .) | nindent 8 }}
{{- include "kramerius.tomcatLogsNfsVolume" (dict "root" . "volumeName" "kramerius-curator-tomcat-logs" "tomcatLogs" .Values.krameriusCurator.tomcatLogs) | nindent 8 }}
{{- include "kramerius.tomcatLogsVolumeClaimTemplates" (dict "root" . "volumeName" "kramerius-curator-tomcat-logs" "tomcatLogs" .Values.krameriusCurator.tomcatLogs) | nindent 2 }}

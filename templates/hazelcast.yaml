{{/* Hazelcast - distributed lock server used by all kramerius apps and workers */}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hazelcast
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kramerius.labels" . | nindent 4 }}
    app.kubernetes.io/name: hazelcast
    app.kubernetes.io/component: lock-server
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hazelcast
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kramerius.labels" . | nindent 4 }}
    app.kubernetes.io/name: hazelcast
    app.kubernetes.io/component: lock-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hazelcast
      app.kubernetes.io/component: lock-server
  serviceName: hazelcast
  updateStrategy:
    type: RollingUpdate
  revisionHistoryLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hazelcast
        app.kubernetes.io/component: lock-server
      annotations:
        checksum/hazelcast-values: {{ include "kramerius.checksum.hazelcastPod" . | quote }}
    spec:
      serviceAccountName: hazelcast
      {{- include "kramerius.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: hazelcast
          image: {{ .Values.hazelcast.image.repository }}:{{ .Values.hazelcast.image.tag }}
          imagePullPolicy: {{ .Values.hazelcast.image.pullPolicy | default "Always" }}
          ports:
            - containerPort: 5701
              name: hazelcast
          envFrom:
            - configMapRef:
                name: timezone-config
          env:
            {{- range $k, $v := .Values.hazelcast.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.hazelcast.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: hazelcast
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kramerius.labels" . | nindent 4 }}
    app.kubernetes.io/name: hazelcast
    app.kubernetes.io/component: lock-server
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: hazelcast
    app.kubernetes.io/component: lock-server
  ports:
    - name: hazelcast
      protocol: TCP
      port: 5701
      targetPort: 5701

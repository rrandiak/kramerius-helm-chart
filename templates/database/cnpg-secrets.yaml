{{- range splitList "," (include "kramerius.database.roles" . | trim) }}
{{- $role := . }}
{{- $roleCfg := fromJson (include "kramerius.database.roleConfig" (dict "root" $ "role" $role)) }}
{{- $existingSecret := index $roleCfg "existingSecret" | default "" | trim }}
{{- if and (eq (include "kramerius.database.roleMode" (dict "root" $ "role" $role)) "cnpg") (not $existingSecret) }}
---
{{ include "kramerius.database.secret" (dict "root" $ "role" $role) }}
{{- end }}
{{- end }}

{{/* Process Manager — Tomcat logging.properties ConfigMap */}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: process-manager-logging
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kramerius.labels" . | nindent 4 }}
data:
  logging.properties: |
    {{- include "kramerius.defaultLoggingProperties" (dict "root" . "value" .Values.processManager.loggingProperties) | nindent 4 }}

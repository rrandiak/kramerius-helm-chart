{{- if .Values.adminClient.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: admin-client
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kramerius.labels" . | nindent 4 }}
    app.kubernetes.io/name: admin-client
    app.kubernetes.io/component: admin-client
spec:
  selector:
    {{- include "kramerius.adminClient.matchLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: 80
{{- end }}

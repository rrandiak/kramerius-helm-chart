{{/* Process Manager - schedules and distributes tasks to workers */}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: process-manager-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kramerius.labels" . | nindent 4 }}
data:
  configuration.properties: |
    {{- include "kramerius.configurationProperties.processManagerMerged" (dict "root" . "extra" .Values.processManager.config.configurationPropertiesExtra) | nindent 4 }}
  {{- if .Values.processManager.config.serverXml }}
  server.xml: |
    {{- .Values.processManager.config.serverXml | nindent 4 }}
  {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: process-manager
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kramerius.labels" . | nindent 4 }}
    app.kubernetes.io/name: process-manager
    app.kubernetes.io/component: process-manager
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: process-manager
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kramerius.labels" . | nindent 4 }}
    app.kubernetes.io/name: process-manager
    app.kubernetes.io/component: process-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: process-manager
      app.kubernetes.io/component: process-manager
  serviceName: process-manager
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  revisionHistoryLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: process-manager
        app.kubernetes.io/component: process-manager
      annotations:
        checksum/kramerius-values: {{ include "kramerius.checksum.processManagerPod" . | quote }}
    spec:
      serviceAccountName: process-manager
      {{- include "kramerius.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: process-manager
          image: {{ .Values.processManager.image.repository }}:{{ .Values.processManager.image.tag }}
          imagePullPolicy: {{ .Values.processManager.image.pullPolicy | default "Always" }}
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: timezone-config
          env:
{{- include "kramerius.tomcatLogsPodNameEnv" . | nindent 12 }}
            {{- range $k, $v := .Values.processManager.env }}
            {{- if and (ne $k "JDBC_URL") (ne $k "JDBC_USERNAME") (ne $k "JDBC_PASSWORD") }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
            - name: JDBC_URL
              value: {{ printf "jdbc:postgresql://%s-rw:5432/%s" .Values.cnpg.processManager.cluster.name "process" | quote }}
            - name: JDBC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: process-db-secret
                  key: username
            - name: JDBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: process-db-secret
                  key: password
          volumeMounts:
{{- include "kramerius.javaagentVolumeMounts" (dict "root" .) | nindent 12 }}
            - mountPath: /root/.kramerius4
              name: process-manager-config-dir
            - mountPath: /root/.kramerius4/configuration.properties
              name: process-manager-config
              subPath: configuration.properties
              readOnly: true
            - mountPath: /usr/local/tomcat/conf/logging.properties
              name: kramerius-tomcat-logging
              subPath: logging.properties
              readOnly: true
            {{- if .Values.processManager.config.serverXml }}
            - mountPath: /usr/local/tomcat/conf/server.xml
              name: process-manager-config
              subPath: server.xml
              readOnly: true
            {{- end }}
            - mountPath: /usr/local/tomcat/logs
              name: process-manager-tomcat-logs
              readOnly: false
          {{- with .Values.processManager.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.processManager.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.processManager.resources | nindent 12 }}
      volumes:
        - name: process-manager-config-dir
          emptyDir: {}
        - name: process-manager-config
          configMap:
            name: process-manager-config
        - name: kramerius-tomcat-logging
          configMap:
            name: kramerius-tomcat-logging
{{- include "kramerius.javaagentVolumes" (dict "root" .) | nindent 8 }}
{{- include "kramerius.tomcatLogsNfsVolume" (dict "root" . "volumeName" "process-manager-tomcat-logs" "tomcatLogs" .Values.processManager.tomcatLogs) | nindent 8 }}
{{- include "kramerius.tomcatLogsVolumeClaimTemplates" (dict "root" . "volumeName" "process-manager-tomcat-logs" "tomcatLogs" .Values.processManager.tomcatLogs) | nindent 2 }}
---
apiVersion: v1
kind: Service
metadata:
  name: process-manager
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "kramerius.labels" . | nindent 4 }}
    app.kubernetes.io/name: process-manager
    app.kubernetes.io/component: process-manager
spec:
  selector:
    app.kubernetes.io/name: process-manager
    app.kubernetes.io/component: process-manager
  ports:
    - name: http
      port: 80
      targetPort: 8080

worker_processes auto;
error_log /dev/stderr info;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /usr/local/openresty/nginx/conf/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    keepalive_requests {{ .Values.gateway.keepaliveRequests }};
    client_max_body_size {{ .Values.gateway.clientMaxBodySize }};

    lua_package_path "/etc/nginx/lua/?.lua;;";
    lua_socket_log_errors off;
    resolver {{ .Values.gateway.resolver }};

    lua_shared_dict rate_misc {{ .Values.gateway.luaSharedDict.rateMisc }};
    lua_shared_dict gateway_rl {{ .Values.gateway.luaSharedDict.rateLimit }};
    lua_shared_dict gateway_dl {{ .Values.gateway.luaSharedDict.downloadQuota }};
{{- $cache := .Values.gateway.caching | default dict }}
{{- if $cache.enabled | default false }}
    lua_shared_dict gateway_cache_mem {{ ($cache.memory | default dict).dictSize | default "64m" }};
    lua_shared_dict gateway_cache_mem_meta {{ ($cache.memory | default dict).metaDictSize | default "8m" }};
{{- range $i, $r := $cache.rules | default list }}
{{- if eq ($r.cacheType | default "proxy_cache") "proxy_cache" }}
    proxy_cache_path /var/cache/nginx/proxy/r{{ $i }} keys_zone=gwpc{{ $i }}:{{ $r.keysZone | default "16m" }} max_size={{ $r.maxSize | default "1g" }} inactive={{ ($cache.proxyCache | default dict).inactive | default "7d" }} levels=1:2 use_temp_path=off;
{{- end }}
{{- end }}
{{- end }}

    init_worker_by_lua_block {
        require("gateway_config").init()
    }

    log_format json_log escape=json
        '{'
        '"remote_addr":"$remote_addr",'
        '"time_local":"$time_local",'
        '"request_method":"$request_method",'
        '"request_uri":"$request_uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"request_time":$request_time,'
        '"actor":"$actor"'
        '}';

{{- if eq (include "kramerius.observability.enabled" .) "true" }}
    access_log /var/log/nginx/access.log json_log;
{{- else }}
    access_log /dev/stdout json_log;
{{- end }}

    map $http_x_forwarded_proto $forward_proto {
        ""      $scheme;
        default $http_x_forwarded_proto;
    }

    server {
        listen 80;
        {{- range .Values.gateway.trustedProxyCidrs }}
        set_real_ip_from {{ . }};
        {{- end }}
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;

        set $curator_path_prefix {{ .Values.gateway.curatorPathPrefix | quote }};
        set $backend_public "http://kramerius-public.{{ .Values.namespace }}.svc.cluster.local:80";
        set $backend_curator "http://kramerius-curator.{{ .Values.namespace }}.svc.cluster.local:80";
        set $kramerius_upstream "";
        set $actor "";

{{- if $cache.enabled | default false }}
{{- range $i, $r := $cache.rules | default list }}
{{- if eq ($r.cacheType | default "proxy_cache") "proxy_cache" }}
{{- $ttl := $r.ttl | int }}
        location @gw_cache_{{ $i }} {
            internal;
            proxy_cache gwpc{{ $i }};
            proxy_cache_key $scheme$request_method$host$request_uri;
            proxy_cache_methods GET HEAD;
            proxy_cache_min_uses {{ $r.minHits | default 2 | int }};
            proxy_cache_valid 200 302 {{ $ttl }}s;
            proxy_cache_valid 404 1s;
            proxy_cache_lock on;
            proxy_cache_revalidate on;
            add_header X-Gateway-Cache $upstream_cache_status always;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forward_proto;
            proxy_connect_timeout {{ $.Values.gateway.proxy.connectTimeout }};
            proxy_send_timeout {{ $.Values.gateway.proxy.sendTimeout }};
            proxy_read_timeout {{ $.Values.gateway.proxy.readTimeout }};
            proxy_pass $kramerius_upstream;
        }
{{- end }}
{{- end }}
{{- end }}

        access_by_lua_block        { require("ratelimiter").on_access() }
        header_filter_by_lua_block { require("ratelimiter").on_header_filter() }
        body_filter_by_lua_block   { require("ratelimiter").on_body_filter() }

        location / {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forward_proto;
            proxy_connect_timeout {{ .Values.gateway.proxy.connectTimeout }};
            proxy_send_timeout {{ .Values.gateway.proxy.sendTimeout }};
            proxy_read_timeout {{ .Values.gateway.proxy.readTimeout }};
            proxy_pass $kramerius_upstream;
        }
    }

}
